name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Clean Gradle cache
      run: ./gradlew clean
    
    - name: Build with Gradle
      run: ./gradlew assembleRelease
      env:
        OAUTH_API_KEY: ${{ secrets.OAUTH_API_KEY }}
        CURSE_API_KEY: ${{ secrets.CURSE_API_KEY }}
        FCL_KEYSTORE_PASSWORD: ${{ secrets.FCL_KEYSTORE_PASSWORD }}
    
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: FCL/build/outputs/apk/release/
    
    - name: Get APK filename
      id: apk
      run: |
        APK_FILE=$(find FCL/build/outputs/apk/release -name "*.apk" | head -1)
        echo "filename=$(basename $APK_FILE)" >> $GITHUB_OUTPUT
        echo "path=$APK_FILE" >> $GITHUB_OUTPUT
    
    - name: Create or Update Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          try {
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: 'latest'
            });
            
            for (const asset of release.data.assets) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id
              });
            }
            
            release_id = release.data.id;
          } catch (error) {
            const newRelease = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'latest',
              name: 'Latest Build',
              prerelease: true
            });
            release_id = newRelease.data.id;
          }
          
          const apkPath = '${{ steps.apk.outputs.path }}';
          const apkName = '${{ steps.apk.outputs.filename }}';
          
          if (fs.existsSync(apkPath)) {
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release_id,
              name: apkName,
              data: fs.readFileSync(apkPath)
            });
          }
          
