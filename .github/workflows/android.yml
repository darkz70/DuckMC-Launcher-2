name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew assembleRelease
      env:
        OAUTH_API_KEY: ${{ secrets.OAUTH_API_KEY }}
        CURSE_API_KEY: ${{ secrets.CURSE_API_KEY }}
        FCL_KEYSTORE_PASSWORD: ${{ secrets.FCL_KEYSTORE_PASSWORD }}
    
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: FCL/build/outputs/apk/release/
    
    - name: Get APK filename
      id: apk
      run: |
        APK_FILE=$(find FCL/build/outputs/apk/release -name "*.apk" | head -1)
        echo "filename=$(basename $APK_FILE)" >> $GITHUB_OUTPUT
        echo "path=$APK_FILE" >> $GITHUB_OUTPUT
    
